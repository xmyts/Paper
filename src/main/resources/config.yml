# ==========================================
# 节点配置文件 (内置于 jar 包中，也可在外部覆盖)
# ==========================================

# UUID (留空则首次运行自动生成并隐藏保存)
uuid: ""

# 伪装域名 (用于 Reality 握手)
sni: "www.bing.com"

# ==========================================
# ⬇️ 【端口配置区】(核心修改点) ⬇️
# ==========================================

# 1. 保底协议 (TCP): VLESS Reality
# 必须填写！填入面板分配给你的游戏端口，例如 25565
reality_port: "25565"

# 2. 冲锋协议 (UDP): Hysteria2
# 灵活配置：
# - 方案A (同端口复用): 填入与上方一模一样的端口 (例如 25565)
# - 方案B (不启用): 留空即代表不开启此协议 (例如 "")
hy2_port: "25565"

# (TUIC 也是 UDP，在面板环境极不稳定，建议废弃留空)
tuic_port: ""
