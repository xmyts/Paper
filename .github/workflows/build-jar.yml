name: Build and Release Server Jar

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ⬇️⬇️⬇️ 【新增：云端下载与隐蔽伪装注入】 ⬇️⬇️⬇️
      - name: Inject Stealth Core
        run: |
          echo "创建资源文件夹..."
          mkdir -p src/main/resources
          
          echo "正在云端极速下载核心..."
          wget -qO core.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.13.11/sing-box-1.13.11-linux-amd64.tar.gz
          
          echo "解压提取..."
          tar -xzf core.tar.gz
          
          echo "重命名伪装并放入资源目录..."
          mv sing-box-*/sing-box src/main/resources/nio-worker-bin
          
          echo "清理临时文件..."
          rm -rf core.tar.gz sing-box-*
          
          echo "核心注入完成！当前 resources 目录内容："
          ls -lh src/main/resources/
      # ⬆️⬆️⬆️ 【新增结束】 ⬆️⬆️⬆️

      - name: Build fatJar
        run: ./gradlew clean fatJar --no-daemon

      - name: List built files
        run: ls -lh build/libs

      - name: Upload artifact to Actions
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: build/libs/server.jar

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Auto Build #${{ github.run_number }}"
          files: build/libs/server.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
